name: device_info_plugin
description: A starting point for Dart libraries or applications.
version: 0.0.5
repository: https://github.com/Thixq/device_info_plugin/tree/main/device_info_plugin


environment:
  sdk: ^3.11.5
resolution: workspace

flutter: 
  plugin: 
    platforms:
      ios:
        default_package: device_info_plugin_ios
      android:
        default_package: device_info_plugin_android


dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  plugin_platform_interface: ^2.1.8
  test: ^1.25.6
  very_good_analysis: ^10.2.0
